name: Deploy Jekyll with MWC PWA

on:
  # メインブランチへのプッシュ時に実行
  push:
    branches: ["main"]
  # 手動実行も可能にする
  workflow_dispatch:

# GITHUB_TOKEN の権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行の制御（デプロイの競合を防ぐ）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        # Jekyllのビルドを実行。HTML以外の静的ファイルもそのままコピーされるように設定
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

